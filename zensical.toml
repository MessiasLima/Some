[project]
site_name = "Some"
site_url = "https://some.appoutlet.dev"
site_description = "A Kotlin test data generation library that creates random instances of any Kotlin class"
site_author = "AppOutlet, Lda"
copyright = "© 2026 AppOutlet, Lda"
repo_url = "https://github.com/MessiasLima/Some"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = "getting-started.md" },
  { "Configuration" = [
    { "Overview" = "configuration/overview.md" },
    { "Nullable Strategy" = "configuration/nullable-strategy.md" },
    { "String Strategy" = "configuration/string-strategy.md" },
    { "Collection Strategy" = "configuration/collection-strategy.md" },
  ] },
  { "Custom Factories" = "custom-factories.md" },
  { "Supported Types" = "supported-types.md" },
  { "API Reference" = "https://some.appoutlet.dev/reference/latest/" },
]

[project.theme]
palette.primary = "deep purple"
palette.accent = "purple"
logo = "logo-icon.svg"
favicon = "logo-icon.svg"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
  "toc.integrate"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.analytics]
provider = "custom"
